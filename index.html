<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Pin Pals — Controller</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="status">connecting…</div>
<div id="sensor-debug"></div>

<div class="screen active" id="screen-join">
  <h1>JOIN THE GAME</h1>
  <input id="name" placeholder="Your name" maxlength="12" autocomplete="off">
  <input id="code" placeholder="ROOM CODE" maxlength="4" autocomplete="off">
  <button id="btn-join">Join</button>
  <p class="hint">Room code is on the TV</p>
</div>

<div class="screen" id="screen-wait">
  <div class="big">You're in! 🎳</div>
  <p class="hint">Waiting for your turn…</p>
</div>

<div class="screen" id="screen-turn">
  <div class="big">YOUR TURN</div>
  <p class="hint">Hold MOVE or ROTATE and slide left/right to set up.<br>
     Then hold the orange zone, swing, and let go!</p>
  <button id="btn-center" class="aux-btn" type="button">Reset Front</button>
  <div id="setup">
    <div class="holdbtn" id="btn-move">⬌ MOVE</div>
    <div class="holdbtn" id="btn-rotate">⟲ ROTATE</div>
  </div>
  <div id="grip">HOLD TO GRIP</div>
</div>

<script src="classes/ConnectionManager.js"></script>
<script src="classes/SensorManager.js"></script>
<script src="classes/GameController.js"></script>
<script src="classes/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Pin Pals — Controller</title>
<style>
  :root { --bg:#14101f; --card:#221a35; --accent:#ffb347; --text:#f5f0ff; }
  * { box-sizing:border-box; margin:0; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--text); font-family:system-ui,sans-serif;
         min-height:100dvh; display:flex; align-items:center; justify-content:center;
         overscroll-behavior:none; }
  .screen { display:none; width:100%; max-width:420px; padding:24px; text-align:center; }
  .screen.active { display:block; }
  h1 { font-size:1.6rem; margin-bottom:20px; letter-spacing:.04em; }
  input { width:100%; padding:14px; margin-bottom:12px; font-size:1.2rem; border-radius:12px;
          border:2px solid #443566; background:var(--card); color:var(--text); text-align:center; }
  input#code { text-transform:uppercase; letter-spacing:.4em; font-weight:700; }
  button { width:100%; padding:16px; font-size:1.2rem; font-weight:700; border:none;
           border-radius:12px; background:var(--accent); color:#14101f; }
  button:active { transform:scale(.97); }
  .big { font-size:2rem; padding:40px 16px; border-radius:20px; background:var(--card); margin-bottom:16px; }
  .hint { opacity:.65; margin-top:14px; font-size:.95rem; }
  #status { position:fixed; top:10px; left:0; right:0; font-size:.8rem; opacity:.5; text-align:center; }

  #grip {
    position:fixed; left:0; right:0; bottom:0; height:62dvh;
    background:var(--card); border-top:4px solid var(--accent);
    border-radius:28px 28px 0 0; touch-action:none; user-select:none;
    -webkit-user-select:none; display:flex; align-items:center; justify-content:center;
    font-size:1.5rem; font-weight:800; letter-spacing:.05em;
  }
  #grip.held { background:var(--accent); color:#14101f; }

  /* iOS can't lock orientation — nag instead */
  @media (orientation: landscape) {
    body::after {
      content:"↻ Turn your phone upright!";
      position:fixed; inset:0; background:var(--bg); z-index:99;
      display:flex; align-items:center; justify-content:center; font-size:1.6rem;
    }
  }
</style>
</head>
<body>
<div id="status">connecting…</div>

<div class="screen active" id="screen-join">
  <h1>JOIN THE GAME</h1>
  <input id="name" placeholder="Your name" maxlength="12" autocomplete="off">
  <input id="code" placeholder="ROOM CODE" maxlength="4" autocomplete="off">
  <button id="btn-join">Join</button>
  <p class="hint">Room code is on the TV</p>
</div>

<div class="screen" id="screen-wait">
  <div class="big">You're in! 🎳</div>
  <p class="hint">Waiting for your turn…</p>
</div>

<div class="screen" id="screen-turn">
  <div class="big">YOUR TURN</div>
  <p class="hint">Hold the orange zone with your thumb,<br>swing your arm, let go to throw!<br>Flick your wrist for spin.</p>
  <div id="grip">HOLD TO GRIP</div>
</div>

<script>
const RELAY_URL = "wss://pin-heads-relay.onrender.com";
// LAN testing from a desktop browser: "ws://localhost:8080"

// ---------- tuning ----------
const FULL_TWIST = 250;   // deg/s of *residual* wrist flick = maximum spin
const SPIN_DEADZONE = 5.0; // below this, the throw counts as dead straight

// ---------- persistent identity ----------
let token = localStorage.getItem("player_token");
if (!token) {
  token = crypto.randomUUID();
  localStorage.setItem("player_token", token);
}

// ---------- ui helpers ----------
const $ = (id) => document.getElementById(id);
function show(name) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $("screen-" + name).classList.add("active");
}

// ---------- websocket with auto-reconnect ----------
let ws = null, joined = false, myTurn = false;
let savedName = localStorage.getItem("player_name") || "";
let savedCode = "";
$("name").value = savedName;

function connect() {
  ws = new WebSocket(RELAY_URL);
  ws.onopen = () => {
    $("status").textContent = "connected";
    if (savedCode) joinRoom();
  };
  ws.onclose = () => {
    $("status").textContent = "reconnecting…";
    joined = false; myTurn = false; gripped = false;
    setTimeout(connect, 1500);
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === "joined") {
      joined = true;
      send({ type: "hello", token, name: savedName });
      show("wait");
    }
    if (msg.type === "error") {
      $("status").textContent = "room not found";
      $("name").disabled = false;
      $("code").disabled = false;
    }
    if (msg.type === "data") handleGameMessage(msg.data);
  };
}
connect();

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}
function joinRoom() { send({ type: "join_room", code: savedCode }); }

function handleGameMessage(d) {
  if (d.msg === "your_turn") { myTurn = true; show("turn"); navigator.vibrate?.(200); }
  if (d.msg === "turn_over") { myTurn = false; gripped = false; show("wait"); }
}

// ---------- join: sensor permission + undo-popup fix + fullscreen ----------
$("btn-join").onclick = async () => {
  savedName = $("name").value.trim() || "Player";
  savedCode = $("code").value.trim().toUpperCase();
  localStorage.setItem("player_name", savedName);
  if (!savedCode) return;

  // no active/editable inputs = no iOS shake-to-undo popup mid-swing
  document.activeElement?.blur();
  $("name").disabled = true;
  $("code").disabled = true;

  // iOS sensor permission must be requested inside a user gesture
  if (typeof DeviceMotionEvent?.requestPermission === "function") {
    try { await DeviceMotionEvent.requestPermission(); } catch {}
  }
  try { await navigator.wakeLock?.request("screen"); } catch {}

  // Android: fullscreen + portrait lock (no-ops on iOS)
  try {
    await document.documentElement.requestFullscreen();
    await screen.orientation.lock("portrait");
  } catch {}

  startSensors();
  joinRoom();
};

// ---------- sensors ----------
// Division of labour:
//   GYRO    rotationRate.beta  -> throw speed (instant, unfiltered)
//   GYRO    rotationRate.gamma -> wrist twist -> spin, AFTER removing the
//           part of gamma that's just the swing leaking in (see below)
//   GRAVITY                    -> swing angle + lean (drift-free, slow phases)
//
// Spin bleed cancellation: gamma only equals pure wrist twist if the phone is
// perfectly aligned with the swing plane — real grips never are, so the swing
// leaks into gamma proportionally to swing speed. Each throw we fit that
// proportion (slope of twist vs speed over the whole grip) and measure the
// flick as the residual. Auto-calibrates per player, per throw.

let gx = 0, gy = 0, gz = 9.8;  // low-passed gravity (device frame)
let px = 0, py = 0, pz = 1;    // previous gravity direction (unit vector)

let swing = 0;        // accumulated swing angle (deg), zeroed at grip
let tilt = 0;         // lean (deg), relative to grip pose — for slow aiming only
let tiltRaw = 0;      // absolute sideways gravity angle
let tiltZero = 0;     // tiltRaw captured at grip
let gripped = false;
let velocity = 0;     // deg/s about the swing axis (gyro)
let twist = 0;        // deg/s about the long axis (gyro, contaminated by swing)
let sumVV = 0;        // bleed-fit accumulators (reset each grip)
let sumVW = 0;
let lastTime = 0;
let velHistory = [];  // recent {t, v, w} samples for the release maths

function startSensors() {
  window.addEventListener("devicemotion", (e) => {
    const g = e.accelerationIncludingGravity;
    if (!g) return;
    const k = 0.3;
    gx += k * ((g.x ?? 0) - gx);
    gy += k * ((g.y ?? 0) - gy);
    gz += k * ((g.z ?? 0) - gz);

    // normalise to a direction
    const len = Math.hypot(gx, gy, gz) || 1;
    const nx = gx / len, ny = gy / len, nz = gz / len;

    // lean: how far gravity tips along the phone's x axis (slow-phase use only)
    tiltRaw = Math.asin(Math.max(-1, Math.min(1, nx))) * 180 / Math.PI;
    tilt = tiltRaw - tiltZero;

    if (gripped) {
      // ANGLE: signed gravity rotation about the x axis since last frame
      const crossX = py * nz - pz * ny;        // (prev × now).x
      const dot = px * nx + py * ny + pz * nz;
      const delta = Math.atan2(crossX, dot) * 180 / Math.PI;
      swing += delta;

      const now = performance.now();
      const dt = (now - lastTime) / 1000;
      lastTime = now;

      // SPEED + TWIST: straight off the gyro
      const gyro = e.rotationRate;
      if (gyro && gyro.beta != null) {
        velocity = gyro.beta;                  // swing axis
        twist = gyro.gamma ?? 0;               // long axis (swing-contaminated)
      } else if (dt > 0) {
        // rare gyro-less device: fall back to differentiated gravity angle
        velocity = velocity * 0.7 + (delta / dt) * 0.3;
        twist = 0;
      }

      // accumulate the bleed fit over the whole grip
      sumVV += velocity * velocity;
      sumVW += velocity * twist;

      velHistory.push({ t: now, v: velocity, w: twist });
      while (velHistory.length && now - velHistory[0].t > 200) velHistory.shift();
    }
    px = nx; py = ny; pz = nz;
  });

  // stream while gripped, ~25Hz
  setInterval(() => {
    if (joined && myTurn && gripped) {
      send({ type: "motion",
             tilt:  Math.round(tilt * 10) / 10,
             swing: Math.round(swing * 10) / 10 });
    }
  }, 40);
}

// ---------- grip button ----------
const grip = $("grip");

grip.addEventListener("touchstart", (e) => {
  e.preventDefault();
  if (!myTurn || gripped) return;
  gripped = true;
  swing = 0;             // this grip pose is the arm's start position
  tiltZero = tiltRaw;    // ...and its neutral lean
  velocity = 0;
  twist = 0;
  sumVV = 0;
  sumVW = 0;
  velHistory = [];
  lastTime = performance.now();
  grip.classList.add("held");
  grip.textContent = "SWING!";
  navigator.vibrate?.(80);
  send({ type: "grip" });
}, { passive: false });

// deliberate release = throw
grip.addEventListener("touchend", (e) => {
  e.preventDefault();
  if (!gripped) return;
  gripped = false;
  resetGripUI();

  // how much of gamma was just the swing leaking in, for THIS grip
  const slope = sumVV > 1 ? sumVW / sumVV : 0;

  // peak swing speed and peak residual flick over the final 200ms
  let peak = 0, peakFlick = 0;
  for (const s of velHistory) {
    if (Math.abs(s.v) > Math.abs(peak)) peak = s.v;
    const flick = s.w - slope * s.v;          // twist with the swing removed
    if (Math.abs(flick) > Math.abs(peakFlick)) peakFlick = flick;
  }

  let spin = Math.max(-1, Math.min(1, peakFlick / FULL_TWIST));
  if (Math.abs(spin) < SPIN_DEADZONE) spin = 0;   // straight means straight

  send({ type: "throw",
         speed: Math.round(Math.abs(peak)),       // deg/s
         spin:  spin,                             // -1 … +1, 0 if no real flick
         angle: Math.round(swing * 10) / 10 });   // arm angle at release
  velHistory = [];
  navigator.vibrate?.([60, 40, 60]);
}, { passive: false });

// interrupted touch (slip / system gesture) = drop the ball, no throw
grip.addEventListener("touchcancel", (e) => {
  e.preventDefault();
  if (!gripped) return;
  gripped = false;
  resetGripUI();
  velHistory = [];
  send({ type: "grip_cancel" });
}, { passive: false });

function resetGripUI() {
  grip.classList.remove("held");
  grip.textContent = "HOLD TO GRIP";
}
</script>
</body>
</html>
